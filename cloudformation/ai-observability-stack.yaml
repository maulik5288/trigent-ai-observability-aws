AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Trigent AI Observability Stack - Langfuse v3 tracing + LLM cost dashboards
  (Grafana/ClickHouse) + automated eval hooks, on a single EC2 instance.
  TEST version: boots any region's latest Ubuntu 24.04 and installs the stack
  at first boot. MARKETPLACE version: replace ImageId with the product AMI
  RegionMap (see comments) and remove UserData (stack is baked into the AMI).

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: Network }
        Parameters: [VpcId, SubnetId, AllowedCIDR]
      - Label: { default: Instance }
        Parameters: [InstanceType, KeyName, VolumeSize]
    ParameterLabels:
      AllowedCIDR: { default: Allowed source CIDR (your IP range) }

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into (default VPC is fine for evaluation)
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet in the selected VPC
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access (used to read generated credentials)
  AllowedCIDR:
    Type: String
    Description: CIDR allowed to reach SSH (22), Langfuse (3000) and Grafana (3001). Use <your-ip>/32 or your ISP range.
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid IPv4 CIDR, e.g. 203.0.113.10/32
  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues: [t3.large, t3.xlarge, m6i.xlarge, m6i.2xlarge]
    Description: t3.large (8 GB) minimum; t3.xlarge+ for production volumes
  VolumeSize:
    Type: Number
    Default: 60
    MinValue: 30
    MaxValue: 500
    Description: Root EBS volume size (GB)

  # TEST MODE ONLY - resolves the latest Canonical Ubuntu 24.04 AMI per region.
  # MARKETPLACE: delete this parameter and use the RegionMap below instead.
  UbuntuAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id
    Description: (Test mode) latest Ubuntu 24.04 AMI via SSM public parameter

# MARKETPLACE CONVERSION - uncomment and fill with the product AMI IDs that
# AWS Marketplace clones into each enabled region; regions here must exactly
# match the regions enabled in the Product Load Form. Then set
# ImageId: !FindInMap [RegionMap, !Ref 'AWS::Region', AmiId]
#
# Mappings:
#   RegionMap:
#     us-east-1:      { AmiId: ami-XXXXXXXXXXXXXXXXX }
#     ap-south-1:     { AmiId: ami-XXXXXXXXXXXXXXXXX }
#     eu-west-1:      { AmiId: ami-XXXXXXXXXXXXXXXXX }

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AI Observability stack - Langfuse + Grafana
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 22,   ToPort: 22,   CidrIp: !Ref AllowedCIDR, Description: SSH }
        - { IpProtocol: tcp, FromPort: 3000, ToPort: 3000, CidrIp: !Ref AllowedCIDR, Description: Langfuse UI + API }
        - { IpProtocol: tcp, FromPort: 3001, ToPort: 3001, CidrIp: !Ref AllowedCIDR, Description: Grafana cost dashboards }
      SecurityGroupEgress:
        - { IpProtocol: '-1', CidrIp: 0.0.0.0/0, Description: All outbound }
      Tags:
        - { Key: Name, Value: !Sub '${AWS::StackName}-sg' }

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${AWS::StackName}-lt'
      LaunchTemplateData:
        ImageId: !Ref UbuntuAmiId   # MARKETPLACE: !FindInMap [RegionMap, !Ref 'AWS::Region', AmiId]
        InstanceType: !Ref InstanceType
        KeyName: !Ref KeyName
        MetadataOptions:
          HttpTokens: required        # IMDSv2
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 2  # containers can reach IMDS
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: !Ref VolumeSize
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        # TEST MODE ONLY - gzipped first-boot bootstrap (cloud-init decompresses).
        # MARKETPLACE: remove UserData entirely; the baked AMI runs the same
        # provisioning from a first-boot systemd unit.
        UserData: ''

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      SubnetId: !Ref SubnetId
      SecurityGroupIds: [!GetAtt SecurityGroup.GroupId]
      Tags:
        - { Key: Name, Value: !Ref 'AWS::StackName' }
        - { Key: Project, Value: ai-observability-marketplace }

Outputs:
  PublicIp:
    Description: Instance public IP
    Value: !GetAtt Instance.PublicIp
  LangfuseURL:
    Description: Langfuse UI (allow 5-8 minutes after stack completion for first boot)
    Value: !Sub 'http://${Instance.PublicIp}:3000'
  GrafanaURL:
    Description: Grafana LLM cost dashboards
    Value: !Sub 'http://${Instance.PublicIp}:3001'
  CredentialsCommand:
    Description: Fetch generated credentials (admin logins + API keys)
    Value: !Sub "ssh -i <your-key.pem> ubuntu@${Instance.PublicIp} 'sudo cat /opt/ai-observability/credentials.txt'"
  InstanceId:
    Value: !Ref Instance
